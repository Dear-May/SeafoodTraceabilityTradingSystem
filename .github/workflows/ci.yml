name: CI

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]

jobs:
  java-backend:
    name: Java Backend Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./SeafoodTraceabilityTradingSystem_backend_Java
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: maven
      - name: Build with Maven
        run: mvn -B package -DskipTests
      - name: Run tests
        run: mvn test

  frontend:
    name: Frontend Build & Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./SeafoodTraceabilityTradingSystem_frontend
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: ./SeafoodTraceabilityTradingSystem_frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Build
        run: npm run build

  python-backend:
    name: Python Backend Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./SeafoodTraceabilityTradingSystem_backend_Python
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Check Django project
        run: |
          python manage.py check
