server {
    listen 80;
    server_name localhost;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 1000;

    # Frontend static files
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files \ \/ /index.html;
    }

    # Java backend API proxy
    location /api/ {
        proxy_pass http://java-backend:8888/;
        proxy_set_header Host \System.Management.Automation.Internal.Host.InternalHost;
        proxy_set_header X-Real-IP \;
        proxy_set_header X-Forwarded-For \;
        proxy_set_header X-Forwarded-Proto \;
    }

    # Java backend good API
    location /good/ {
        proxy_pass http://java-backend:8888;
        proxy_set_header Host \System.Management.Automation.Internal.Host.InternalHost;
        proxy_set_header X-Real-IP \;
        proxy_set_header X-Forwarded-For \;
    }

    # Java backend user API
    location /user/ {
        proxy_pass http://java-backend:8888;
        proxy_set_header Host \System.Management.Automation.Internal.Host.InternalHost;
        proxy_set_header X-Real-IP \;
        proxy_set_header X-Forwarded-For \;
    }

    # Java backend WebSocket
    location /ws/ {
        proxy_pass http://java-backend:8888;
        proxy_http_version 1.1;
        proxy_set_header Upgrade \;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host \System.Management.Automation.Internal.Host.InternalHost;
        proxy_set_header X-Real-IP \;
        proxy_set_header X-Forwarded-For \;
    }

    # Python image search API
    location /image-search/ {
        proxy_pass http://python-backend:8889/api/;
        proxy_set_header Host \System.Management.Automation.Internal.Host.InternalHost;
        proxy_set_header X-Real-IP \;
        proxy_set_header X-Forwarded-For \;
        client_max_body_size 10M;
    }
}
